  <text x="70" y="148" font-size="11" fill="#e0e0e0">All</text>
  <text x="318" y="146" font-size="9" fill="#8a94b8">&#9662;</text>
  <text x="346" y="126" font-size="9" fill="#8a94b8">OBJECTIVE</text>
