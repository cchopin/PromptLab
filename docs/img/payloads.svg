    <rect x="560" y="258" width="64" height="16" rx="3" fill="#1d2f5a"/><text x="592" y="270" font-size="9" fill="#e0e0e0" text-anchor="middle">jailbreak</text>
    <rect x="700" y="258" width="104" height="16" rx="3" fill="#2a1d4a"/><text x="752" y="270" font-size="9" fill="#e0e0e0" text-anchor="middle">bypass_refusal</text>
    <text x="840" y="270" font-size="11" fill="#e0e0e0">direct</text>
